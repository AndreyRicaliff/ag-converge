<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Portaria — AG Converge</title>
<link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
<style>
:root {
  --bg:       #09090F;
  --card:     #111019;
  --raise:    #18162A;
  --purple:   #7B2FE0;
  --phi:      #A55EFF;
  --plo:      #C49FFF;
  --white:    #F8F6FF;
  --muted:    #7A708F;
  --border:   #241B3A;
  --green:    #08C16A;
  --red:      #FF5C5C;
  --orange:   #F5A623;
  --radius:   14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--white);
  display:flex;flex-direction:column;
  -webkit-tap-highlight-color:transparent;
}

/* ── AUTH ── */
#authGate{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
}
.auth-box{
  background:var(--raise);border:1px solid var(--border);
  border-radius:20px;padding:40px 32px;max-width:360px;width:92%;text-align:center;
}
.auth-logo{height:32px;width:auto;display:block;margin:0 auto 20px}
.auth-title{font-size:1.1rem;font-weight:800;margin-bottom:4px}
.auth-sub{font-size:.78rem;color:var(--muted);margin-bottom:24px}
.auth-input{
  width:100%;padding:14px 16px;
  background:rgba(255,255,255,.04);border:1.5px solid var(--border);
  border-radius:10px;font-size:1rem;color:var(--white);
  font-family:inherit;outline:none;text-align:center;letter-spacing:.18em;
  transition:border-color .2s;margin-bottom:10px;
}
.auth-input:focus{border-color:var(--purple)}
.auth-input.err{border-color:var(--red)}
.auth-err{color:var(--red);font-size:.72rem;margin-bottom:14px;min-height:16px}
.auth-btn{
  width:100%;padding:13px;border-radius:10px;
  background:var(--purple);color:#fff;font-weight:700;font-size:.9rem;
  font-family:inherit;border:none;cursor:pointer;transition:background .2s;
}
.auth-btn:hover{background:var(--phi)}

/* ── HEADER ── */
header{
  height:56px;padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(9,9,15,.95);border-bottom:1px solid var(--border);
  flex-shrink:0;position:sticky;top:0;z-index:100;
}
.h-brand{display:flex;align-items:center;gap:10px}
.h-logo{height:20px;width:auto;object-fit:contain}
.h-title{font-size:.78rem;font-weight:800;color:var(--white)}
.h-event{font-size:.65rem;color:var(--phi);margin-top:1px}
.h-counter{
  display:flex;align-items:center;gap:8px;
  background:rgba(8,193,106,.1);border:1px solid rgba(8,193,106,.3);
  padding:5px 12px;border-radius:100px;
}
.h-count-n{font-size:.88rem;font-weight:800;color:var(--green)}
.h-count-l{font-size:.63rem;color:rgba(8,193,106,.7);letter-spacing:.04em}

/* ── SCAN AREA ── */
.scan-wrap{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  padding:24px 16px 16px;gap:16px;
  max-width:520px;margin:0 auto;width:100%;
}

.scan-label{
  font-size:.65rem;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--phi);
}

.scan-input-wrap{position:relative;width:100%}
#scanInput{
  width:100%;padding:18px 52px 18px 20px;
  background:var(--card);border:2px solid var(--border);
  border-radius:var(--radius);font-size:1.05rem;font-weight:700;
  font-family:'Inter',monospace,'Courier New';color:var(--white);
  outline:none;text-transform:uppercase;letter-spacing:.12em;
  transition:border-color .2s;
}
#scanInput::placeholder{font-weight:400;letter-spacing:.04em;font-size:.88rem;color:var(--muted);text-transform:none}
#scanInput:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(123,47,224,.15)}
#scanInput.ok{border-color:var(--green);box-shadow:0 0 0 3px rgba(8,193,106,.12)}
#scanInput.already{border-color:var(--orange);box-shadow:0 0 0 3px rgba(245,166,35,.12)}
#scanInput.notfound{border-color:var(--red);box-shadow:0 0 0 3px rgba(255,92,92,.1)}
.scan-clear{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:1.1rem;padding:4px;line-height:1;transition:color .2s;
}
.scan-clear:hover{color:var(--white)}

#scanBtn{
  width:100%;padding:16px;border-radius:var(--radius);
  background:var(--purple);color:#fff;
  font-weight:800;font-size:1rem;font-family:inherit;
  border:none;cursor:pointer;transition:all .2s;
  box-shadow:0 0 28px rgba(123,47,224,.3);
}
#scanBtn:hover{background:var(--phi);transform:translateY(-1px)}
#scanBtn:disabled{opacity:.5;cursor:default;transform:none}

/* ── RESULTADO ── */
#resultArea{width:100%}

.result-card{
  background:var(--card);border-radius:var(--radius);
  border:1.5px solid var(--border);overflow:hidden;
}
.result-card.status-ok{border-color:rgba(8,193,106,.5)}
.result-card.status-already{border-color:rgba(245,166,35,.45)}
.result-card.status-notfound{border-color:rgba(255,92,92,.4)}

.rc-top{
  padding:20px;
  display:flex;align-items:flex-start;gap:14px;
}
.rc-icon{
  width:48px;height:48px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1.5rem;
}
.status-ok    .rc-icon{background:rgba(8,193,106,.12)}
.status-already .rc-icon{background:rgba(245,166,35,.12)}
.status-notfound .rc-icon{background:rgba(255,92,92,.1)}

.rc-info{flex:1;min-width:0}
.rc-nome{font-size:1.1rem;font-weight:900;margin-bottom:3px;line-height:1.2}
.rc-empresa{font-size:.78rem;color:var(--muted);margin-bottom:8px}
.rc-badges{display:flex;gap:6px;flex-wrap:wrap}
.rc-badge{
  font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:2px 9px;border-radius:100px;
}
.badge-green{background:rgba(8,193,106,.12);color:var(--green);border:1px solid rgba(8,193,106,.3)}
.badge-orange{background:rgba(245,166,35,.12);color:var(--orange);border:1px solid rgba(245,166,35,.3)}
.badge-red{background:rgba(255,92,92,.1);color:var(--red);border:1px solid rgba(255,92,92,.3)}
.badge-purple{background:rgba(123,47,224,.12);color:var(--phi);border:1px solid rgba(123,47,224,.3)}
.badge-muted{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}

.rc-meta{
  padding:0 20px 16px;
  display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;
}
.rc-meta-item{font-size:.75rem;color:var(--muted)}
.rc-meta-item strong{color:var(--white);display:block;font-size:.8rem}

.rc-actions{
  padding:14px 20px;
  border-top:1px solid var(--border);
  display:flex;gap:10px;
}
.btn-confirmar{
  flex:1;padding:13px;border-radius:10px;
  background:var(--green);color:#fff;
  font-weight:800;font-size:.9rem;font-family:inherit;
  border:none;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-confirmar:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-confirmar:disabled{opacity:.5;cursor:default;transform:none}
.btn-cancelar{
  padding:13px 18px;border-radius:10px;
  background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,255,255,.1);
  color:var(--muted);font-weight:600;font-size:.88rem;
  font-family:inherit;cursor:pointer;transition:all .2s;
}
.btn-cancelar:hover{border-color:var(--red);color:var(--red)}

/* ── SUCCESS FLASH ── */
.flash{
  width:100%;padding:14px 18px;border-radius:var(--radius);
  display:flex;align-items:center;gap:12px;
  font-size:.88rem;font-weight:700;
  animation:fadeIn .25s ease;
}
.flash.ok{background:rgba(8,193,106,.12);border:1px solid rgba(8,193,106,.3);color:var(--green)}
.flash.warn{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);color:var(--orange)}
.flash.err{background:rgba(255,92,92,.08);border:1px solid rgba(255,92,92,.3);color:var(--red)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ── HISTÓRICO RECENTE ── */
.recent-wrap{width:100%}
.recent-label{
  font-size:.63rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;
}
.recent-list{display:flex;flex-direction:column;gap:6px}
.recent-item{
  display:flex;align-items:center;gap:10px;
  background:var(--card);border:1px solid var(--border);
  border-radius:9px;padding:10px 14px;
  animation:fadeIn .2s ease;
}
.ri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--green)}
.ri-nome{font-size:.82rem;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-id{font-size:.63rem;color:var(--muted);font-family:monospace;letter-spacing:.04em}
.ri-time{font-size:.62rem;color:var(--muted);flex-shrink:0}

/* ── SESSION STATS ── */
.session-stats{
  width:100%;display:flex;gap:8px;flex-wrap:wrap;
  background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;
}
.ss-item{flex:1;min-width:80px;text-align:center}
.ss-val{font-size:1.05rem;font-weight:900;color:var(--phi);line-height:1}
.ss-lbl{font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:2px}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  #scanInput{font-size:.95rem;padding:15px 44px 15px 14px}
  .rc-meta{grid-template-columns:1fr}
  .rc-nome{font-size:1rem}
}
</style>
</head>
<body>

<!-- ── AUTH GATE ── -->
<div id="authGate">
  <div class="auth-box">
    <img class="auth-logo" src="/assets/logos/ag-logo.png" alt="AG Consultoria">
    <div class="auth-title">Portaria — AG Converge</div>
    <div class="auth-sub">Acesso restrito à equipe do evento</div>
    <input type="password" id="authInput" class="auth-input" placeholder="Senha">
    <div class="auth-err" id="authErr"></div>
    <button class="auth-btn" onclick="checkAuth()">Entrar</button>
  </div>
</div>

<!-- ── HEADER ── -->
<header>
  <div class="h-brand">
    <img class="h-logo" src="/assets/logos/ag-logo.png" alt="AG">
    <div>
      <div class="h-title">Portaria</div>
      <div class="h-event">RH em Xeque · 14 mai 2026</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div id="netStatus" style="display:flex;align-items:center;gap:4px;font-size:.58rem;font-weight:700;letter-spacing:.06em;padding:3px 8px;border-radius:100px;background:rgba(8,193,106,.12);color:var(--green);border:1px solid rgba(8,193,106,.25);transition:all .3s">
      <span id="netDot" style="width:5px;height:5px;border-radius:50%;background:var(--green);display:inline-block"></span>
      <span id="netLbl">ONLINE</span>
    </div>
    <div class="h-counter">
      <div style="display:flex;flex-direction:column;align-items:center;line-height:1.1">
        <span style="font-size:.5rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(8,193,106,.6);margin-bottom:1px">Entradas</span>
        <span class="h-count-n" id="cntEntraram">—</span>
      </div>
      <span class="h-count-l" style="font-size:.7rem">/ <span id="cntTotal">—</span> inscritos</span>
    </div>
  </div>
</header>

<!-- ── CONTEÚDO ── -->
<div class="scan-wrap">

  <!-- Modo toggle: QR/Comanda ↔ Busca por nome -->
  <div style="display:flex;gap:6px;width:100%">
    <button id="modeQR"   onclick="setMode('qr')"   style="flex:1;padding:8px;border-radius:8px;font-size:.72rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;background:var(--purple);color:#fff;border:none">📷 Comanda</button>
    <button id="modeNome" onclick="setMode('nome')" style="flex:1;padding:8px;border-radius:8px;font-size:.72rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border)">🔍 Nome</button>
  </div>

  <span class="scan-label" id="scanLabel">Comanda do participante</span>

  <div class="scan-input-wrap">
    <input type="text" id="scanInput"
           placeholder="RHX-XXXX-XXXX"
           autocomplete="off" autocorrect="off"
           spellcheck="false"
           onkeydown="if(event.key==='Enter')doScan()"
           oninput="resetState()">
    <button class="scan-clear" onclick="clearInput()" title="Limpar">✕</button>
  </div>

  <button id="scanBtn" onclick="doScan()">Consultar</button>

  <div id="resultArea"></div>

  <!-- Stats de sessão (visível quando há entradas) -->
  <div class="session-stats" id="sessionStats" style="display:none">
    <div class="ss-item"><div class="ss-val" id="ssCount">0</div><div class="ss-lbl">entradas</div></div>
    <div class="ss-item"><div class="ss-val" id="ssRate">—</div><div class="ss-lbl">/hora</div></div>
    <div class="ss-item"><div class="ss-val" id="ssLast">—</div><div class="ss-lbl">última</div></div>
    <div class="ss-item"><div class="ss-val" id="ssSession">—</div><div class="ss-lbl">sessão</div></div>
  </div>

  <div class="recent-wrap" id="recentWrap" style="display:none">
    <div class="recent-label">Últimas entradas desta sessão</div>
    <div class="recent-list" id="recentList"></div>
  </div>

</div>


<script src="/assets/js/supabase.min.js"></script>
<script>
if (!window.supabase) {
  document.body.innerHTML = '<div style="color:#fff;background:#09090F;height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui;font-size:.9rem;text-align:center;padding:20px">Erro ao carregar recursos. Verifique a conexão e recarregue a página.</div>';
}

const EVENT_ID = 'rh-em-xeque';

const _SB = supabase.createClient(
  'https://hqcbpqkohgmlultnmbyy.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxY2JwcWtvaGdtbHVsdG5tYnl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyOTIyMTAsImV4cCI6MjA5Mzg2ODIxMH0.NCAvbQYVmLmcZuofj0B9Tkr7sv-tvz4QcTZLtjdWD-M'
);

let pwdHash = '';
let recentEntries = [];
let currentPerson = null;
let _wakeLock = null;
let sessionStart = null;
let _mode = 'qr'; // 'qr' | 'nome'

async function keepScreenOn() {
  try {
    _wakeLock = await navigator.wakeLock?.request('screen');
    _wakeLock?.addEventListener('release', () => { _wakeLock = null; });
  } catch(e) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && !_wakeLock) keepScreenOn();
});

// ── AUTH ──────────────────────────────────────────────────
async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function checkAuth() {
  const val = document.getElementById('authInput').value;
  if (!val) return;
  const h = await sha256hex(val);
  const { data, error } = await _SB.rpc('portaria_count', {
    p_evento_id: EVENT_ID, p_pwd_hash: h
  });
  if (error || !data) {
    const inp = document.getElementById('authInput');
    inp.classList.add('err');
    document.getElementById('authErr').textContent = 'Senha incorreta';
    setTimeout(() => inp.classList.remove('err'), 1000);
    return;
  }
  pwdHash = h;
  sessionStart = Date.now();
  document.getElementById('authGate').style.display = 'none';
  updateCounter(data[0]);
  document.getElementById('scanInput').focus();
  keepScreenOn();
  setInterval(refreshCounter, 20000);
  startPortariaRealtime();
  updateNetStatus();
}

function startPortariaRealtime() {
  try {
    _SB.channel('portaria-live')
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'registrations',
          filter: `evento_id=eq.${EVENT_ID}` }, () => { refreshCounter(); })
      .subscribe();
  } catch(e) {}
}

document.getElementById('authInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkAuth();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && pwdHash) {
    clearInput();
    document.getElementById('resultArea').innerHTML = '';
  }
});

// ── COUNTER ──────────────────────────────────────────────
async function refreshCounter() {
  try {
    const { data } = await _SB.rpc('portaria_count', {
      p_evento_id: EVENT_ID, p_pwd_hash: pwdHash
    });
    if (data?.[0]) updateCounter(data[0]);
  } catch(e) {
    console.warn('refreshCounter:', e);
  }
}

function updateCounter(row) {
  document.getElementById('cntEntraram').textContent = row.entraram ?? '—';
  document.getElementById('cntTotal').textContent    = row.total ?? '—';
}

// ── MODO QR / NOME ────────────────────────────────────────
function setMode(m) {
  _mode = m;
  const inp   = document.getElementById('scanInput');
  const btn   = document.getElementById('scanBtn');
  const lbl   = document.getElementById('scanLabel');
  const mQR   = document.getElementById('modeQR');
  const mNome = document.getElementById('modeNome');
  if (m === 'nome') {
    inp.placeholder = 'Parte do nome...';
    inp.style.textTransform = 'none';
    inp.style.letterSpacing = '0';
    btn.textContent = 'Buscar';
    lbl.textContent = 'Busca por nome';
    mNome.style.cssText = 'flex:1;padding:8px;border-radius:8px;font-size:.72rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;background:var(--purple);color:#fff;border:none';
    mQR.style.cssText   = 'flex:1;padding:8px;border-radius:8px;font-size:.72rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border)';
  } else {
    inp.placeholder = 'RHX-XXXX-XXXX';
    inp.style.textTransform = 'uppercase';
    inp.style.letterSpacing = '.12em';
    btn.textContent = 'Consultar';
    lbl.textContent = 'Comanda do participante';
    mQR.style.cssText   = 'flex:1;padding:8px;border-radius:8px;font-size:.72rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;background:var(--purple);color:#fff;border:none';
    mNome.style.cssText = 'flex:1;padding:8px;border-radius:8px;font-size:.72rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border)';
  }
  clearInput();
}

// ── SCAN ─────────────────────────────────────────────────
function resetState() {
  document.getElementById('scanInput').classList.remove('ok','already','notfound');
  document.getElementById('resultArea').innerHTML = '';
  currentPerson = null;
}

function clearInput() {
  document.getElementById('scanInput').value = '';
  resetState();
  document.getElementById('scanInput').focus();
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function maskEmail(e) {
  if (!e) return null;
  const [u, d] = e.split('@');
  if (!d) return null;
  return u[0] + '***@' + d;
}

function maskTel(t) {
  if (!t) return null;
  const d = t.replace(/\D/g,'');
  return d.length >= 4 ? '****-' + d.slice(-4) : null;
}

async function doNomeLookup() {
  const q = document.getElementById('scanInput').value.trim();
  if (q.length < 2) return;
  const btn = document.getElementById('scanBtn');
  btn.disabled = true; btn.textContent = 'Buscando...';
  const TIMEOUT_MS = 8000;
  const timeoutP = new Promise(r => setTimeout(() => r({ data: null, error: { message: 'timeout' } }), TIMEOUT_MS));
  const { data, error } = await Promise.race([
    _SB.rpc('lookup_by_nome', { p_nome: q, p_evento_id: EVENT_ID, p_pwd_hash: pwdHash }),
    timeoutP,
  ]);
  btn.disabled = false; btn.textContent = 'Buscar';
  const res = document.getElementById('resultArea');
  if (error?.message === 'timeout') {
    res.innerHTML = `<div class="flash err">⚡ Sem resposta. Verifique a conexão.</div>`; return;
  }
  const rows = data || [];
  if (!rows.length) {
    playBeep('warn');
    res.innerHTML = `<div class="result-card status-notfound"><div class="rc-top"><div class="rc-icon">🔍</div><div class="rc-info"><div class="rc-nome">Nenhum resultado para "${esc(q)}"</div><div class="rc-empresa">Verifique o nome ou use a comanda</div></div></div></div>`;
    return;
  }
  // Lista de resultados — operador clica para selecionar
  res.innerHTML = `
    <div style="font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">${rows.length} resultado(s)</div>
    ${rows.map((p, i) => `
      <div class="result-card" style="cursor:pointer;margin-bottom:8px;transition:border-color .2s" onclick="selectFromNome(${i})" onmouseover="this.style.borderColor='var(--purple-hi)'" onmouseout="this.style.borderColor=''">
        <div class="rc-top">
          <div class="rc-icon">${p.entrada_at ? '✅' : '🎫'}</div>
          <div class="rc-info">
            <div class="rc-nome">${esc(p.nome)}</div>
            <div class="rc-empresa">${esc(p.empresa||'—')}${p.cargo?' · '+esc(p.cargo):''}</div>
            <div class="rc-badges">
              <span class="rc-badge badge-green">${esc(p.ingresso_id)}</span>
              ${p.entrada_at ? `<span class="rc-badge badge-orange">Entrou às ${fmtTime(p.entrada_at)}</span>` : '<span class="rc-badge badge-green">Não entrou</span>'}
            </div>
            ${(maskEmail(p.email)||maskTel(p.tel)) ? `<div style="font-size:.6rem;color:rgba(255,255,255,.35);margin-top:4px;letter-spacing:.02em">Confirmar: ${[maskEmail(p.email), maskTel(p.tel)].filter(Boolean).join(' · ')}</div>` : ''}
          </div>
        </div>
      </div>`).join('')}
  `;
  window._nomeResults = rows;
}

function selectFromNome(idx) {
  const p = (window._nomeResults || [])[idx];
  if (!p) return;
  currentPerson = p;
  const res = document.getElementById('resultArea');
  if (p.entrada_at) {
    playBeep('warn');
    document.getElementById('scanInput').classList.add('already');
    res.innerHTML = `
      <div class="result-card status-already">
        <div class="rc-top">
          <div class="rc-icon">⚠️</div>
          <div class="rc-info">
            <div class="rc-nome">${esc(p.nome)}</div>
            <div class="rc-empresa">${esc(p.empresa||'—')}</div>
            <div class="rc-badges"><span class="rc-badge badge-orange">Já entrou às ${fmtTime(p.entrada_at)}</span></div>
            ${(maskEmail(p.email)||maskTel(p.tel)) ? `<div style="font-size:.6rem;color:rgba(255,255,255,.35);margin-top:4px;letter-spacing:.02em">Confirmar: ${[maskEmail(p.email), maskTel(p.tel)].filter(Boolean).join(' · ')}</div>` : ''}
          </div>
        </div>
        <div class="rc-actions"><button class="btn-cancelar" onclick="clearInput()">Fechar</button></div>
      </div>`;
    return;
  }
  document.getElementById('scanInput').classList.add('ok');
  res.innerHTML = `
    <div class="result-card status-ok">
      <div class="rc-top">
        <div class="rc-icon">✅</div>
        <div class="rc-info">
          <div class="rc-nome">${esc(p.nome)}</div>
          <div class="rc-empresa">${esc(p.empresa||'—')}${p.cargo?' · '+esc(p.cargo):''}</div>
          <div class="rc-badges">
            <span class="rc-badge badge-green">Inscrito</span>
            ${p.doacao>0 ? `<span class="rc-badge badge-purple">Doou R$ ${(+p.doacao).toFixed(2).replace('.',',')}</span>` : '<span class="rc-badge badge-muted">Sem doação</span>'}
          </div>
          ${(maskEmail(p.email)||maskTel(p.tel)) ? `<div style="font-size:.6rem;color:rgba(255,255,255,.35);margin-top:4px;letter-spacing:.02em">Confirmar: ${[maskEmail(p.email), maskTel(p.tel)].filter(Boolean).join(' · ')}</div>` : ''}
        </div>
      </div>
      <div class="rc-meta">
        <div class="rc-meta-item"><strong>${esc(p.ingresso_id)}</strong>Comanda</div>
        <div class="rc-meta-item"><strong>${fmtTime(p.inscricao_at)}</strong>Inscrito às</div>
      </div>
      <div class="rc-actions">
        <button class="btn-confirmar" id="btnConfirmar" onclick="confirmarEntrada()">✓ Confirmar entrada</button>
        <button class="btn-cancelar" onclick="clearInput()">Cancelar</button>
      </div>
    </div>`;
}

async function doScan() {
  if (_mode === 'nome') { await doNomeLookup(); return; }
  const raw = document.getElementById('scanInput').value.trim().toUpperCase();
  if (!raw) return;

  const btn = document.getElementById('scanBtn');
  btn.disabled = true; btn.textContent = 'Buscando...';

  const TIMEOUT_MS = 8000;
  const timeoutPromise = new Promise(res => setTimeout(() => res({ data: null, error: { message: 'timeout' } }), TIMEOUT_MS));
  const { data, error } = await Promise.race([
    _SB.rpc('lookup_by_ingresso_id', { p_ingresso_id: raw }),
    timeoutPromise
  ]);

  btn.disabled = false; btn.textContent = 'Consultar';

  if (error?.message === 'timeout') {
    document.getElementById('resultArea').innerHTML = `<div class="flash err">⚡ Sem resposta do servidor. Verifique a conexão.</div>`;
    return;
  }

  const resultArea = document.getElementById('resultArea');
  const inp = document.getElementById('scanInput');

  if (error || !data?.length) {
    playBeep('warn');
    inp.classList.add('notfound');
    resultArea.innerHTML = `
      <div class="result-card status-notfound">
        <div class="rc-top">
          <div class="rc-icon">❌</div>
          <div class="rc-info">
            <div class="rc-nome">Comanda não encontrada</div>
            <div class="rc-empresa">${esc(raw)}</div>
            <div class="rc-badges">
              <span class="rc-badge badge-red">Não registrado</span>
            </div>
          </div>
        </div>
      </div>`;
    return;
  }

  const p = data[0];
  currentPerson = p;

  // Evento diferente?
  if (p.evento_id !== EVENT_ID) {
    playBeep('warn');
    inp.classList.add('notfound');
    resultArea.innerHTML = `
      <div class="result-card status-notfound">
        <div class="rc-top">
          <div class="rc-icon">⚠️</div>
          <div class="rc-info">
            <div class="rc-nome">${esc(p.nome)}</div>
            <div class="rc-empresa">Ingresso de outro evento: <strong>${esc(p.evento_id)}</strong></div>
            <div class="rc-badges">
              <span class="rc-badge badge-red">Evento inválido</span>
            </div>
          </div>
        </div>
      </div>`;
    return;
  }

  // Já entrou?
  if (p.entrada_at) {
    playBeep('warn');
    inp.classList.add('already');
    resultArea.innerHTML = `
      <div class="result-card status-already">
        <div class="rc-top">
          <div class="rc-icon">⚠️</div>
          <div class="rc-info">
            <div class="rc-nome">${esc(p.nome)}</div>
            <div class="rc-empresa">${esc(p.empresa||'—')}</div>
            <div class="rc-badges">
              <span class="rc-badge badge-orange">Já entrou às ${fmtTime(p.entrada_at)}</span>
              ${p.doacao>0 ? `<span class="rc-badge badge-purple">Doou R$ ${(+p.doacao).toFixed(2).replace('.',',')}</span>` : ''}
            </div>
            ${(maskEmail(p.email)||maskTel(p.tel)) ? `<div style="font-size:.6rem;color:rgba(255,255,255,.35);margin-top:4px;letter-spacing:.02em">Confirmar: ${[maskEmail(p.email), maskTel(p.tel)].filter(Boolean).join(' · ')}</div>` : ''}
          </div>
        </div>
        <div class="rc-actions">
          <button class="btn-cancelar" onclick="clearInput()">Limpar</button>
        </div>
      </div>`;
    return;
  }

  // Novo — pronto para confirmar
  inp.classList.add('ok');
  resultArea.innerHTML = `
    <div class="result-card status-ok">
      <div class="rc-top">
        <div class="rc-icon">✅</div>
        <div class="rc-info">
          <div class="rc-nome">${esc(p.nome)}</div>
          <div class="rc-empresa">${esc(p.empresa||'—')}${p.cargo ? ' · '+esc(p.cargo) : ''}</div>
          <div class="rc-badges">
            <span class="rc-badge badge-green">Inscrito</span>
            ${!p.titular ? `<span class="rc-badge badge-purple">Convidado${p.titular_nome?' de '+esc(p.titular_nome.split(' ')[0]):''}</span>` : ''}
            ${p.doacao>0 ? `<span class="rc-badge badge-purple">Doou R$ ${(+p.doacao).toFixed(2).replace('.',',')}</span>` : '<span class="rc-badge badge-muted">Sem doação</span>'}
          </div>
          ${(maskEmail(p.email)||maskTel(p.tel)) ? `<div style="font-size:.6rem;color:rgba(255,255,255,.35);margin-top:4px;letter-spacing:.02em">Confirmar: ${[maskEmail(p.email), maskTel(p.tel)].filter(Boolean).join(' · ')}</div>` : ''}
        </div>
      </div>
      <div class="rc-meta">
        <div class="rc-meta-item"><strong>${esc(p.ingresso_id)}</strong>Comanda</div>
        <div class="rc-meta-item"><strong>${fmtTime(p.inscricao_at)}</strong>Inscrito às</div>
      </div>
      <div class="rc-actions">
        <button class="btn-confirmar" id="btnConfirmar" onclick="confirmarEntrada()">
          ✓ Confirmar entrada
        </button>
        <button class="btn-cancelar" onclick="clearInput()">Cancelar</button>
      </div>
    </div>`;
}

// ── CONFIRMAR ENTRADA ─────────────────────────────────────
async function confirmarEntrada() {
  if (!currentPerson) return;
  const btn = document.getElementById('btnConfirmar');
  if (btn) { btn.disabled = true; btn.textContent = 'Registrando...'; }

  const { data: confirmado, error } = await _SB.rpc('mark_entrada', {
    p_ingresso_id: currentPerson.ingresso_id,
    p_pwd_hash: pwdHash
  });

  if (error) {
    playBeep('warn');
    document.getElementById('resultArea').innerHTML = `
      <div class="flash err">❌ Erro ao registrar. Tente novamente.</div>`;
    return;
  }

  if (!confirmado) {
    playBeep('warn');
    document.getElementById('resultArea').innerHTML = `
      <div class="flash warn">⚠️ Entrada já confirmada por outro terminal.</div>`;
    refreshCounter();
    currentPerson = null;
    setTimeout(() => { clearInput(); document.getElementById('resultArea').innerHTML = ''; }, 2500);
    return;
  }

  playBeep('ok');

  // Adiciona ao histórico da sessão
  recentEntries.unshift({
    nome: currentPerson.nome,
    id: currentPerson.ingresso_id,
    time: new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
  });
  renderRecent();

  const firstName = esc(currentPerson.nome.split(' ')[0]);

  const donaBadge = currentPerson.doacao > 0
    ? `<span style="font-size:.68rem;background:rgba(8,193,106,.15);color:#08C16A;border-radius:100px;padding:2px 10px;font-weight:700">♥ PIX R$ ${(+currentPerson.doacao).toFixed(2).replace('.',',')}</span>`
    : (currentPerson.doacao_confirmada ? '<span style="font-size:.68rem;background:rgba(245,166,35,.15);color:#F5A623;border-radius:100px;padding:2px 10px;font-weight:700">🧺 Cesta</span>' : '');

  // Flash de sucesso — nome grande, bem visível no check-in rápido
  document.getElementById('resultArea').innerHTML = `
    <div class="flash ok" style="font-size:1.05rem;padding:18px 20px;flex-direction:column;gap:6px;text-align:center">
      <span style="font-size:1.6rem">✓</span>
      <strong>${firstName}</strong>
      <span style="font-size:.82rem;font-weight:400;opacity:.8">Bem-vindo(a)! Entrada confirmada.</span>
      ${donaBadge}
    </div>`;

  refreshCounter();
  currentPerson = null;

  // Limpa e re-foca para próximo scan
  setTimeout(() => {
    clearInput();
    document.getElementById('resultArea').innerHTML = '';
  }, 2500);
}

// ── HISTÓRICO + STATS DE SESSÃO ───────────────────────────
function renderRecent() {
  const wrap  = document.getElementById('recentWrap');
  const list  = document.getElementById('recentList');
  const stats = document.getElementById('sessionStats');

  if (!recentEntries.length) {
    wrap.style.display  = 'none';
    stats.style.display = 'none';
    return;
  }

  // Session stats
  stats.style.display = 'flex';
  const n = recentEntries.length;
  const elapsed = sessionStart ? (Date.now() - sessionStart) / 36e5 : 0; // hours
  const rate    = elapsed > 0 ? Math.round(n / elapsed) : n;
  const lastT   = recentEntries[0]?.time || '—';
  const sessionT = sessionStart
    ? new Date(sessionStart).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
    : '—';
  document.getElementById('ssCount').textContent   = n;
  document.getElementById('ssRate').textContent    = rate;
  document.getElementById('ssLast').textContent    = lastT;
  document.getElementById('ssSession').textContent = sessionT;

  wrap.style.display = 'block';
  list.innerHTML = recentEntries.slice(0, 8).map(r => `
    <div class="recent-item">
      <div class="ri-dot"></div>
      <div class="ri-nome">${esc(r.nome)}</div>
      <div class="ri-id">${esc(r.id)}</div>
      <div class="ri-time">${esc(r.time)}</div>
    </div>
  `).join('');
}

// ── FEEDBACK SONORO + HÁPTICO ────────────────────────────
function playBeep(type) {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (type === 'ok') {
      osc.frequency.value = 1046; // C6 — tom de sucesso
      gain.gain.setValueAtTime(0.22, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.28);
      osc.start(); osc.stop(ctx.currentTime + 0.28);
      navigator.vibrate?.([90]);
    } else {
      osc.type = 'square';
      osc.frequency.value = 380;
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
      osc.start(); osc.stop(ctx.currentTime + 0.45);
      navigator.vibrate?.([180, 80, 180]);
    }
  } catch(e) {}
}

// Foca automaticamente no input ao carregar após auth
window.addEventListener('load', () => {
  document.getElementById('authInput').focus();
});

// ── INDICADOR DE REDE ────────────────────────────────────
function updateNetStatus() {
  const el  = document.getElementById('netStatus');
  const dot = document.getElementById('netDot');
  const lbl = document.getElementById('netLbl');
  if (!el) return;
  if (navigator.onLine) {
    el.style.cssText  = 'display:flex;align-items:center;gap:4px;font-size:.58rem;font-weight:700;letter-spacing:.06em;padding:3px 8px;border-radius:100px;background:rgba(8,193,106,.12);color:#08C16A;border:1px solid rgba(8,193,106,.25);transition:all .3s';
    dot.style.background = '#08C16A';
    lbl.textContent = 'ONLINE';
  } else {
    el.style.cssText  = 'display:flex;align-items:center;gap:4px;font-size:.58rem;font-weight:700;letter-spacing:.06em;padding:3px 8px;border-radius:100px;background:rgba(255,92,92,.12);color:#FF5C5C;border:1px solid rgba(255,92,92,.25);transition:all .3s';
    dot.style.background = '#FF5C5C';
    lbl.textContent = 'SEM REDE';
  }
}
window.addEventListener('online',  updateNetStatus);
window.addEventListener('offline', updateNetStatus);
</script>
